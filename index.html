<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Blog API - Test Frontend</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mon Blog API (INF222)</h1>
        <p>Tester l'API Spring Boot en direct.</p>
        <button onclick="loadArticles()">Actualiser la liste</button>
        <div id="list"></div>
    </div>
    <script>
        async function loadArticles() {
            const res = await fetch('/api/articles');
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(a => `
                <div class="card">
                    <h3>${a.titre}</h3>
                    <p>${a.contenu}</p>
                    <small>Par ${a.auteur} le ${a.date}</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
